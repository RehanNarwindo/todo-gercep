syntax = "proto3";

package todo;

option go_package = "./proto";

service TodoService {
  rpc CreateTask (CreateTaskRequest) returns (TaskResponse);
  
  rpc ListTasks (EmptyRequest) returns (TaskListResponse);
  
  rpc GetTask (GetTaskRequest) returns (TaskResponse);
  
  rpc CompleteTask (GetTaskRequest) returns (TaskResponse);
  
  rpc DeleteTask (GetTaskRequest) returns (DeleteResponse);
}

message Task {
  int32 id = 1;
  string title = 2;
  string description = 3;
  bool completed = 4;
  string created_at = 5;
}

message CreateTaskRequest {
  string title = 1;
  string description = 2;
}

message GetTaskRequest {
  int32 id = 1;
}

message TaskResponse {
  bool success = 1;
  string message = 2;
  Task task = 3;
}

message TaskListResponse {
  repeated Task tasks = 1;
  int32 total = 2;
}

message EmptyRequest {}

message DeleteResponse {
  bool success = 1;
  string message = 2;
}